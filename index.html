<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levantamento de Equipamentos - Proteção Civil de Santo Tirso</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a7ea4 0%, #0d5a7a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            text-align: center;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #0a7ea4 0%, #ff9500 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
        }
        
        h1 {
            color: #11181c;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #687076;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 30px 0;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #0a7ea4;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }
        
        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }
        
        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            40% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .message {
            color: #687076;
            font-size: 16px;
            line-height: 1.6;
            margin: 20px 0;
        }
        
        .button {
            display: inline-block;
            background: #0a7ea4;
            color: white;
            padding: 12px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        
        .button:hover {
            background: #0d5a7a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(10, 126, 164, 0.2);
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            color: #9ba1a6;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔥</div>
        <h1>Levantamento de Equipamentos</h1>
        <p class="subtitle">Proteção Civil de Santo Tirso</p>
        
        <div class="loading">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <p class="message">A aplicação está a carregar...</p>
        
        <button class="button" onclick="redirectToApp()">Abrir Aplicação</button>
        
        <div class="footer">
            <p>Versão 1.0.0 | Abril 2026</p>
        </div>
    </div>

    <script>
        // URL da app web (temporária - será atualizada quando publicar em domínio permanente)
        const APP_URL = 'https://8081-i8lm17dcw9qsqffwvtbab-8e5e96a3.us2.manus.computer';
        
        function redirectToApp() {
            window.location.href = APP_URL;
        }
        
        // Redirecionar automaticamente após 3 segundos
        setTimeout(() => {
            redirectToApp();
        }, 3000);
    </script>
</body>
</html>
